# ---- Render Blueprint (Infrastructure as Code) ----
# This file tells Render what to deploy when you connect your GitHub repo.
# Database: Uses external Neon PostgreSQL (free tier, no expiration).

services:
  - type: web
    name: voicehr
    plan: free
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "cd backend && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false  # Set manually in Render Dashboard → points to Neon PostgreSQL
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: OPENAI_API_KEY
        value: ""
